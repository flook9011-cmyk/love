<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"/>
<title> อยากเย็ดเธอจังเลยอะ </title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&family=Sarabun:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;}
html,body{width:100%;height:100%;overflow:hidden;}

:root{
  --gold:#ffd7fc;--gold2:#e8c98a;--gold3:#f5e4b8;
  --dark:#ddaff1;--card:#ffffff;--ink:#1e140a;
  --brown:#000000;--clay:#b8975a;
  --ease:cubic-bezier(.4,0,.2,1);
  --spring:cubic-bezier(.34,1.56,.64,1);
}

body{
  background:var(--dark);
  display:flex;align-items:center;justify-content:center;
  font-family:'DM Sans','Sarabun',sans-serif;
  position:relative;padding:16px;
  min-height:100vh;
}

/* aurora bg */
.orb{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;animation:orbPulse ease-in-out infinite alternate;}
@keyframes orbPulse{0%{opacity:.55;transform:scale(1);}100%{opacity:.85;transform:scale(1.1);}}

/* falling bears */
.fb{position:fixed;top:-80px;pointer-events:none;z-index:1;animation:fall linear infinite;opacity:0;}
@keyframes fall{0%{transform:translateY(0) rotate(-10deg);opacity:0;}6%{opacity:.45;}94%{opacity:.45;}100%{transform:translateY(110vh) rotate(22deg);opacity:0;}}

/* loader */
#loader{
  position:fixed;inset:0;z-index:1000;background:var(--dark);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;
  transition:opacity .9s var(--ease),visibility .9s;
}
#loader.gone{opacity:0;visibility:hidden;pointer-events:none;}
.l-ring{width:60px;height:60px;position:relative;}
.l-ring>svg{width:100%;height:100%;animation:spin 1.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.l-inner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
.l-txt{font-family:'Cormorant Garamond',serif;font-size:.76rem;letter-spacing:4px;color:var(--gold);text-transform:uppercase;opacity:.7;}
.l-bar{width:90px;height:1px;background:rgba(201,169,110,.12);overflow:hidden;}
.l-bar::after{content:'';display:block;height:100%;background:linear-gradient(90deg,transparent,var(--gold2),transparent);animation:sweep 1.5s ease-in-out infinite;}
@keyframes sweep{0%{transform:translateX(-100%);}100%{transform:translateX(200%);}}

/* wrap */
#wrap{
  position:relative;z-index:10;width:min(400px,96vw);
  opacity:0;transform:translateY(28px) scale(.97);
  transition:opacity 1s .1s var(--ease),transform 1s .1s var(--ease);
}
#wrap.show{opacity:1;transform:translateY(0) scale(1);}

/* card */
.card{
  background:var(--card);border-radius:28px;overflow:hidden;
  box-shadow:
    0 0 0 1px rgba(201,169,110,.18),
    0 8px 40px rgba(0,0,0,.22),
    0 40px 80px rgba(0,0,0,.3),
    inset 0 1px 0 rgba(255,255,255,.95);
  padding:38px 32px 32px;
  display:flex;flex-direction:column;align-items:center;
  position:relative;
  background:
    radial-gradient(ellipse 80% 35% at 50% 0%,rgba(201,169,110,.08),transparent),
    var(--card);
}

/* shimmer top */
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),var(--gold3),var(--gold),transparent);
  background-size:200% 100%;
  animation:shine 3s linear infinite;
}
@keyframes shine{0%{background-position:200% 0;}100%{background-position:-200% 0;}}

/* character */
.char{
  width:min(200px,50vw);
  filter:drop-shadow(0 12px 28px rgba(44,24,4,.22));
  animation:bob 4s ease-in-out infinite;
  margin-bottom:24px;
}
@keyframes bob{0%,100%{transform:translateY(0) rotate(-.4deg);}50%{transform:translateY(-14px) rotate(.4deg);}}

/* ornament */
.orn{display:flex;align-items:center;gap:10px;margin-bottom:18px;width:100%;}
.ol{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(184,151,90,.5));}
.or{flex:1;height:1px;background:linear-gradient(90deg,rgba(184,151,90,.5),transparent);}
.od{width:7px;height:7px;background:var(--clay);transform:rotate(45deg);flex-shrink:0;}

/* question */
.qt{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(1.3rem,5.5vw,1.75rem);
  font-weight:300;color:var(--ink);
  text-align:center;line-height:1.8;
  white-space:pre-line;margin-bottom:8px;
}
.qt em{font-style:italic;color:var(--brown);}

.qs{
  font-size:clamp(.75rem,3vw,.88rem);color:var(--clay);
  text-align:center;margin-bottom:28px;
  font-weight:300;letter-spacing:.8px;opacity:.8;
}

/* button row */
.br{
  display:flex;gap:14px;justify-content:center;
  align-items:center;flex-wrap:wrap;
  min-height:60px;width:100%;
}

/* base btn */
.btn{
  position:relative;overflow:hidden;
  border-radius:100px;border:none;
  font-family:'DM Sans',sans-serif;
  font-weight:500;letter-spacing:2px;text-transform:uppercase;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;user-select:none;
}
.btn::after{
  content:'';position:absolute;top:0;left:-90%;width:55%;height:100%;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,.45),transparent);
  transform:skewX(-18deg);transition:left .5s var(--ease);
}
.btn:hover::after{left:145%;}
.btn:active{transform:translateY(4px) scale(.9)!important;box-shadow:none!important;}

/* LOVE btn */
#loveBtn{
  padding:15px 40px;
  font-size:.88rem;
  background:linear-gradient(135deg,#c9a96e,#8c5e28,#c9a96e);
  background-size:200% 100%;
  color:#fff8ec;
  box-shadow:0 5px 0 #5a3610,0 8px 24px rgba(140,94,40,.5),inset 0 1px 0 rgba(255,255,255,.2);
  animation:goldShift 4s linear infinite;
  transition:
    font-size .45s var(--spring),
    padding .45s var(--spring),
    box-shadow .18s var(--ease),
    transform .18s var(--ease);
}
@keyframes goldShift{0%{background-position:0%;}100%{background-position:200%;}}
#loveBtn:hover{transform:translateY(-3px);box-shadow:0 8px 0 #5a3610,0 16px 36px rgba(140,94,40,.6),inset 0 1px 0 rgba(255,255,255,.2);}

/* NO btn */
#noBtn{
  padding:13px 30px;
  font-size:.84rem;
  background:transparent;
  color:var(--clay);
  border:1.5px solid rgba(184,151,90,.4);
  transition:
    font-size .35s var(--ease),
    padding .35s var(--ease),
    opacity .35s var(--ease),
    transform .18s var(--ease);
}
#noBtn:hover{background:rgba(201,169,110,.08);border-color:var(--gold);transform:translateY(-2px);}

/* shake */
@keyframes shake{0%,100%{transform:translateX(0) rotate(0);}20%{transform:translateX(-5px) rotate(-2deg);}40%{transform:translateX(5px) rotate(2deg);}60%{transform:translateX(-4px) rotate(-1deg);}80%{transform:translateX(4px) rotate(1deg);}}
.shake{animation:shake .35s ease both!important;}

/* end screen */
#endScreen{
  display:none;
  flex-direction:column;align-items:center;
  width:100%;
}
#endScreen.show{display:flex;}
.end-char{
  width:min(200px,50vw);
  filter:drop-shadow(0 12px 28px rgba(44,24,4,.22));
  animation:bob 4s ease-in-out infinite;
  margin-bottom:20px;
}
.end-txt{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(1.2rem,5vw,1.6rem);
  font-weight:400;color:var(--brown);
  text-align:center;line-height:1.8;white-space:pre-line;
  margin-bottom:8px;
}
.end-sub{
  font-size:clamp(.74rem,3vw,.86rem);color:var(--clay);
  text-align:center;margin-bottom:24px;opacity:.8;letter-spacing:.8px;
}
.btn-restart{
  padding:13px 32px;font-size:.82rem;letter-spacing:1.8px;
  background:rgba(201,169,110,.12);color:var(--brown);
  border:1.5px solid rgba(184,151,90,.3);border-radius:100px;
}
.btn-restart:hover{background:rgba(201,169,110,.2);transform:translateY(-2px);}

/* foot */
.foot{
  margin-top:20px;padding-top:12px;
  border-top:1px solid rgba(184,151,90,.12);
  width:100%;text-align:center;
  font-family:'Cormorant Garamond',serif;
  font-size:.68rem;letter-spacing:3px;
  color:rgba(160,120,72,.4);text-transform:uppercase;
}

/* music btn */
#musicBtn{
  position:fixed;bottom:20px;right:20px;z-index:500;
  width:42px;height:42px;border-radius:50%;
  border:1.5px solid rgba(201,169,110,.3);
  background:rgba(17,14,9,.8);backdrop-filter:blur(16px);
  color:var(--gold);cursor:pointer;
  display:flex;align-items:center;justify-content:center;padding:10px;
  transition:transform .2s,background .2s,border-color .2s;
  box-shadow:0 4px 20px rgba(0,0,0,.4);
  -webkit-tap-highlight-color:transparent;
}
#musicBtn:hover{background:rgba(201,169,110,.15);border-color:var(--gold);transform:scale(1.1);}
#musicBtn.playing::after{content:'';position:absolute;inset:-5px;border-radius:50%;border:1.5px solid rgba(201,169,110,.3);animation:ring 1.8s ease-out infinite;}
@keyframes ring{0%{transform:scale(1);opacity:.8;}100%{transform:scale(1.55);opacity:0;}}
#musicBtn.playing svg{animation:spin 5s linear infinite;}

/* particles */
.pt{position:fixed;pointer-events:none;z-index:999;border-radius:50%;animation:ptUp .9s ease-out forwards;}
@keyframes ptUp{0%{opacity:.9;transform:translateY(0);}100%{opacity:0;transform:translateY(-130px) scale(.05);}}
.cf{position:fixed;pointer-events:none;z-index:999;animation:cfFall 1.7s ease-in forwards;}
@keyframes cfFall{0%{opacity:1;transform:translateY(0) rotate(0);}100%{opacity:0;transform:translateY(260px) rotate(760deg) scale(.06);}}

/* pop */
@keyframes popIn{0%{transform:scale(.2) rotate(-12deg);opacity:0;}60%{transform:scale(1.1) rotate(3deg);}100%{transform:scale(1) rotate(0);opacity:1;}}
.pop{animation:popIn .6s var(--spring) both;}

/* glow on love when no hidden */
@keyframes loveGlow{0%,100%{box-shadow:0 5px 0 #5a3610,0 8px 24px rgba(140,94,40,.5);}50%{box-shadow:0 5px 0 #5a3610,0 8px 40px rgba(201,169,110,.8),0 0 60px rgba(201,169,110,.4);}}
</style>
</head>

<script>
const bSVG=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 68">

}

      <path d="M88 112 Q100 124 112 112" fill="none" stroke="#7a4418" stroke-width="2.8" stroke-linecap="round"/>
      <g filter="url(#glow2)">
        <path d="M100 196 C100 196 62 170 62 141 C62 127 72 115 84 120 C92 124 100 136 100 136 C100 136 108 124 116 120 C128 115 138 127 138 141 C138 170 100 196 100 196Z" fill="url(#eh)"/>
        <ellipse cx="82" cy="133" rx="11" ry="9" fill="rgba(255,255,255,.24)" transform="rotate(-35 82 133)"/>
      </g>
      <ellipse cx="57" cy="157" rx="24" ry="14" fill="url(#e1)" transform="rotate(-30 57 157)"/>
      <ellipse cx="143" cy="157" rx="24" ry="14" fill="url(#e1)" transform="rotate(30 143 157)"/>
      <g fill="#c8a060" opacity=".6" filter="url(#glow2)">
        <path d="M26 78 L28 87 L30 78 L28 69Z" transform="rotate(22 28 78)"/>
        <path d="M22 76 L30 78 L22 80 L14 78Z" transform="rotate(22 28 78)"/>
        <path d="M168 73 L170 82 L172 73 L170 64Z" transform="rotate(-18 170 73)"/>
        <path d="M164 71 L172 73 L164 75 L156 73Z" transform="rotate(-18 170 73)"/>
      </g>
      <ellipse cx="83" cy="219" rx="17" ry="8" fill="url(#e1)"/>
      <ellipse cx="117" cy="219" rx="17" ry="8" fill="url(#e1)"/>
      </svg>
    </div>
    <div class="orn"><div class="ol"></div><div class="od"></div><div class="or"></div></div>
    <div class="end-txt">อยากบอกว่าเงี่ยนอยากเย็ดอยากเสร็จจัง</div>
    <div class="end-sub"></div>
    <button class="btn btn-restart" id="restartBtn">เริ่มใหม่</button>
  </div>

  <div class="foot">ฟลุ๊ค &nbsp;&middot;&nbsp; ลิ</div>
</div>
</div>

<script>
let noCount = 0;
const loveBtn = document.getElementById('loveBtn');
const noBtn   = document.getElementById('noBtn');
const mainScreen = document.getElementById('mainScreen');
const endScreen  = document.getElementById('endScreen');
const qText = document.getElementById('qText');
const qSub  = document.getElementById('qSub');

/* NO — ทำให้ LOVE ใหญ่ขึ้น NO เล็กลง */
noBtn.addEventListener('click', e => {
  sfxNo();
  if(navigator.vibrate) navigator.vibrate([80, 60, 80, 60, 120]);
  // jumpscare ครั้งแรกเท่านั้น
  if(noCount === 0) jumpscare();
  noCount++;

  /* LOVE ใหญ่ขึ้น */
  const lvFont = 0.88 + noCount * 0.22;
  const lvPadV = 15  + noCount * 5;
  const lvPadH = 40  + noCount * 12;
  loveBtn.style.fontSize = lvFont + 'rem';
  loveBtn.style.padding  = `${lvPadV}px ${lvPadH}px`;

  /* NO เล็กลง จางลง */
  const noFont = Math.max(0.48, 0.84 - noCount * 0.14);
  const noPadV = Math.max(5,   13   - noCount * 2);
  const noPadH = Math.max(10,  30   - noCount * 5);
  const noOpac = Math.max(0.12, 1   - noCount * 0.22);
  noBtn.style.fontSize = noFont + 'rem';
  noBtn.style.padding  = `${noPadV}px ${noPadH}px`;
  noBtn.style.opacity  = noOpac;

  /* ข้อความเปลี่ยนตามจำนวนครั้ง */
  const msgs = [
    {q:"ลิรักฟลุ๊คมั้ย?",          s:""},
    {q:"แน่ใจแล้วเหรอ?",             s:""},
    {q:"จริงๆ เลยเหรอ...",           s:""},
    {q:"ยังไม่รักเลยจริงๆ เหรอ?",   s:""},
    {q:"กด LOVE ได้เลยนะ...",        s:""},
  ];
  const m = msgs[Math.min(noCount, msgs.length-1)];
  qText.textContent = m.q;
  qSub.textContent  = m.s;

  /* shake NO */
  noBtn.classList.remove('shake');
  void noBtn.offsetWidth;
  noBtn.classList.add('shake');

  /* ครั้งที่ 5 ซ่อน NO */
  if(noCount >= 5){
    noBtn.style.display = 'none';
    loveBtn.style.animation = 'goldShift 4s linear infinite, loveGlow .9s ease-in-out infinite alternate';
  }

  burst('#a09070', e);
});

/* LOVE — จบ */
loveBtn.addEventListener('click', e => {
  sfxLove();
  burst('#c9a96e', e);
  setTimeout(() => {
    mainScreen.style.display = 'none';
    endScreen.classList.add('show');
    sfxConfetti();
    confetti();
  }, 200);
});

/* RESTART */
document.getElementById('restartBtn').addEventListener('click', e => {
  sfxPop();
  noCount = 0;
  loveBtn.style.fontSize = '';
  loveBtn.style.padding  = '';
  loveBtn.style.animation = 'goldShift 4s linear infinite';
  noBtn.style.fontSize = '';
  noBtn.style.padding  = '';
  noBtn.style.opacity  = '';
  noBtn.style.display  = '';
  qText.textContent = 'ฟลุ๊คมั้ย?';
  qSub.textContent  = '';
  endScreen.classList.remove('show');
  mainScreen.style.display = '';
  burst(null, e);
});

function burst(col, e){
  const cs = col ? [col] : ['#c9a96e','#e8c98a','#a07838'];
  for(let k=0;k<12;k++){
    const p=document.createElement('div');p.className='pt';
    const sz=5+Math.random()*8;
    const x=e?.clientX??window.innerWidth/2;
    const y=e?.clientY??window.innerHeight/2;
    p.style.cssText=`left:${x+(Math.random()-.5)*120}px;top:${y+(Math.random()-.5)*80}px;width:${sz}px;height:${sz}px;background:${cs[k%cs.length]};`;
    document.body.appendChild(p);p.addEventListener('animationend',()=>p.remove());
  }
}
function confetti(){
  const cl=['#c9a96e','#e8c98a','#f5e4b8','#a07838','#7a5028','#dfc098'];
  for(let k=0;k<44;k++){
    const c=document.createElement('div');c.className='cf';
    c.style.cssText=`left:${Math.random()*100}vw;top:${-8+Math.random()*20}vh;background:${cl[k%cl.length]};width:${6+Math.random()*10}px;height:${6+Math.random()*10}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-delay:${Math.random()*.9}s;animation-duration:${1.4+Math.random()*1.2}s;`;
    document.body.appendChild(c);c.addEventListener('animationend',()=>c.remove());
  }
}

/* music */
const bgm=document.getElementById('bgm');
const mBtn=document.getElementById('musicBtn');
const iOn=document.getElementById('iconOn'),iOff=document.getElementById('iconOff');
let playing=false,started=false;
function setPlay(v){playing=v;if(v){bgm.play().catch(()=>{});mBtn.classList.add('playing');iOn.style.display='block';iOff.style.display='none';}else{bgm.pause();mBtn.classList.remove('playing');iOn.style.display='none';iOff.style.display='block';}}
mBtn.addEventListener('click',()=>setPlay(!playing));
function startMusic(){if(started)return;started=true;bgm.volume=.7;setPlay(true);}
document.addEventListener('click',startMusic);
document.addEventListener('touchstart',startMusic);

/* ── JUMPSCARE ── */
const screamAudio = new Audio('hellfamez-horror-metallic-screeches-183236.mp3');
screamAudio.volume = 0.9;

function jumpscare(){
  // overlay มืด
  const overlay = document.createElement('div');
  overlay.style.cssText = `
    position:fixed;inset:0;z-index:9998;
    background:#000;opacity:0;
    transition:opacity .08s;
    pointer-events:none;
  `;
  document.body.appendChild(overlay);

  // ผี SVG วาดเอง
  const ghost = document.createElement('div');
  ghost.style.cssText = `
    position:fixed;inset:0;z-index:9999;pointer-events:none;
    transform:scale(0);opacity:0;
    transition:none;
  `;
  ghost.innerHTML = `<img src="large.jpg" style="width:100vw;height:100vh;object-fit:cover;display:block;" />`;
  document.body.appendChild(ghost);

  // เสียงกร๊ดจากไฟล์จริง
  screamAudio.currentTime = 0;
  screamAudio.play().catch(()=>{});

  requestAnimationFrame(() => {
    overlay.style.opacity = '1';
    ghost.style.transition = 'transform .12s cubic-bezier(.34,1.56,.64,1), opacity .12s';
    ghost.style.transform  = 'scale(1)';
    ghost.style.opacity    = '1';
    setTimeout(() => {
      ghost.style.transition = 'opacity .35s ease-in';
      ghost.style.opacity    = '0';
      overlay.style.transition = 'opacity .35s';
      overlay.style.opacity    = '0';
      setTimeout(() => {
        ghost.remove();
        overlay.remove();
      }, 380);
    }, 800);
  });
}

/* ── SOUND FX (Web Audio API) ── */
let actx = null;
function getCtx(){
  if(!actx) actx = new (window.AudioContext||window.webkitAudioContext)();
  if(actx.state==='suspended') actx.resume();
  return actx;
}

/* เสียง pop เบาๆ */
function sfxPop(){
  const ctx=getCtx();
  const o=ctx.createOscillator();
  const g=ctx.createGain();
  o.connect(g);g.connect(ctx.destination);
  o.type='sine';
  o.frequency.setValueAtTime(520,ctx.currentTime);
  o.frequency.exponentialRampToValueAtTime(280,ctx.currentTime+0.12);
  g.gain.setValueAtTime(0.18,ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.18);
  o.start(ctx.currentTime);o.stop(ctx.currentTime+0.18);
}

/* เสียง NO — น่ารัก เฟิ้วๆ เหมือนเกม */
function sfxNo(){
  const ctx = getCtx();

  // เสียง "boing" ลงต่ำ น่ารัก
  const o1 = ctx.createOscillator();
  const g1 = ctx.createGain();
  o1.connect(g1); g1.connect(ctx.destination);
  o1.type = 'sine';
  o1.frequency.setValueAtTime(480, ctx.currentTime);
  o1.frequency.exponentialRampToValueAtTime(120, ctx.currentTime + 0.3);
  g1.gain.setValueAtTime(0.0001, ctx.currentTime);
  g1.gain.linearRampToValueAtTime(0.22, ctx.currentTime + 0.01);
  g1.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.32);
  o1.start(ctx.currentTime); o1.stop(ctx.currentTime + 0.32);

  // เสียง wobble เสริม น่ารัก
  const o2 = ctx.createOscillator();
  const g2 = ctx.createGain();
  o2.connect(g2); g2.connect(ctx.destination);
  o2.type = 'sine';
  o2.frequency.setValueAtTime(320, ctx.currentTime + 0.05);
  o2.frequency.setValueAtTime(280, ctx.currentTime + 0.12);
  o2.frequency.setValueAtTime(310, ctx.currentTime + 0.18);
  o2.frequency.setValueAtTime(260, ctx.currentTime + 0.24);
  g2.gain.setValueAtTime(0.0001, ctx.currentTime + 0.05);
  g2.gain.linearRampToValueAtTime(0.14, ctx.currentTime + 0.08);
  g2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
  o2.start(ctx.currentTime + 0.05); o2.stop(ctx.currentTime + 0.32);

  // เสียง pop เล็กน้อยด้านบน
  const o3 = ctx.createOscillator();
  const g3 = ctx.createGain();
  o3.connect(g3); g3.connect(ctx.destination);
  o3.type = 'triangle';
  o3.frequency.setValueAtTime(900, ctx.currentTime);
  o3.frequency.exponentialRampToValueAtTime(600, ctx.currentTime + 0.08);
  g3.gain.setValueAtTime(0.0001, ctx.currentTime);
  g3.gain.linearRampToValueAtTime(0.1, ctx.currentTime + 0.01);
  g3.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
  o3.start(ctx.currentTime); o3.stop(ctx.currentTime + 0.1);
}

/* เสียง LOVE — เสียงขึ้นสูง สดใส */
function sfxLove(){
  const ctx=getCtx();
  const notes=[523,659,784,1047];
  notes.forEach((freq,i)=>{
    const o=ctx.createOscillator();
    const g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.type='sine';
    const t=ctx.currentTime+i*0.08;
    o.frequency.setValueAtTime(freq,t);
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(0.14,t+0.02);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.25);
    o.start(t);o.stop(t+0.28);
  });
}

/* เสียง confetti — เสียงระฆังเล็ก */
function sfxConfetti(){
  const ctx=getCtx();
  [880,1108,1318,1568,2093].forEach((freq,i)=>{
    const o=ctx.createOscillator();
    const g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.type='triangle';
    const t=ctx.currentTime+i*0.06;
    o.frequency.setValueAtTime(freq,t);
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(0.12,t+0.01);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.4);
    o.start(t);o.stop(t+0.42);
  });
}

window.addEventListener('load',()=>{
  setTimeout(()=>{
    document.getElementById('loader').classList.add('gone');
    document.getElementById('wrap').classList.add('show');
  },2000);
});
</script>

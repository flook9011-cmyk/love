<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"/>
<title>ฟลุ๊ค × ลิ</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&family=Sarabun:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;}
html,body{width:100%;height:100%;overflow:hidden;}

:root{
  --gold:#c9a96e;
  --gold2:#e8c98a;
  --gold3:#f5e4b8;
  --dark:#110e09;
  --card:#faf6ee;
  --ink:#1e140a;
  --brown:#7a5c38;
  --clay:#b8975a;
  --ease:cubic-bezier(.4,0,.2,1);
  --spring:cubic-bezier(.34,1.56,.64,1);
}

body{
  background:var(--dark);
  display:flex;align-items:center;justify-content:center;
  font-family:'DM Sans','Sarabun',sans-serif;
  position:relative;
  padding:12px;
}

/* ── BACKGROUND AURORA ── */
.aurora{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  overflow:hidden;
}
.aurora-blob{
  position:absolute;border-radius:50%;
  filter:blur(80px);
  animation:auroraMove ease-in-out infinite alternate;
}
@keyframes auroraMove{
  0%  {transform:translate(0,0) scale(1);}
  100%{transform:translate(30px,20px) scale(1.15);}
}

/* ── FALLING BEARS ── */
.fb{
  position:fixed;top:-90px;pointer-events:none;z-index:2;
  animation:fall linear infinite;opacity:0;
}
@keyframes fall{
  0%  {transform:translateY(0) rotate(-10deg);opacity:0;}
  5%  {opacity:.5;}
  95% {opacity:.5;}
  100%{transform:translateY(112vh) rotate(20deg);opacity:0;}
}

/* ── LOADER ── */
#loader{
  position:fixed;inset:0;z-index:1000;
  background:var(--dark);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:24px;
  transition:opacity 1s var(--ease),visibility 1s;
}
#loader.gone{opacity:0;visibility:hidden;pointer-events:none;}

.loader-ring{
  width:64px;height:64px;position:relative;
}
.loader-ring svg{
  width:100%;height:100%;
  animation:loaderSpin 1.8s linear infinite;
}
@keyframes loaderSpin{to{transform:rotate(360deg);}}
.loader-bear-inner{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
}
.loader-bear-inner svg{
  width:34px;height:34px;
  animation:none;
}
.loader-text{
  font-family:'Cormorant Garamond',serif;
  font-size:.78rem;
  letter-spacing:4px;
  color:var(--gold);
  text-transform:uppercase;
  opacity:.7;
}
.loader-bar{
  width:100px;height:1px;
  background:rgba(201,169,110,.15);
  position:relative;overflow:hidden;
}
.loader-bar::after{
  content:'';
  position:absolute;top:0;left:-100%;
  width:100%;height:100%;
  background:linear-gradient(90deg,transparent,var(--gold2),transparent);
  animation:barSweep 1.6s ease-in-out infinite;
}
@keyframes barSweep{
  0%  {left:-100%;}
  100%{left:100%;}
}

/* ── WRAP ── */
#wrap{
  position:relative;z-index:10;
  width:min(400px,96vw);
  opacity:0;transform:translateY(30px) scale(.97);
  transition:opacity 1s .1s var(--ease),transform 1s .1s var(--ease);
}
#wrap.show{opacity:1;transform:translateY(0) scale(1);}

/* ── CARD ── */
.card{
  background:var(--card);
  border-radius:28px;
  overflow:hidden;
  position:relative;
  box-shadow:
    0 0 0 1px rgba(201,169,110,.18),
    0 2px 4px rgba(0,0,0,.08),
    0 10px 40px rgba(0,0,0,.22),
    0 40px 80px rgba(0,0,0,.28),
    inset 0 1px 0 rgba(255,255,255,.95);
}

/* gold shimmer line */
.card-shine{
  position:absolute;top:0;left:0;right:0;
  height:2px;
  background:linear-gradient(90deg,
    transparent 0%,
    var(--gold) 25%,
    var(--gold3) 50%,
    var(--gold) 75%,
    transparent 100%);
  background-size:200% 100%;
  animation:shineMove 3s linear infinite;
  z-index:2;
}
@keyframes shineMove{
  0%  {background-position:200% 0;}
  100%{background-position:-200% 0;}
}

/* ── PAGES ── */
.pages{position:relative;overflow:hidden;}
.page{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;
  padding:36px 30px 28px;
  opacity:0;pointer-events:none;
  transform:translateX(48px) scale(.97);
  transition:
    opacity .5s var(--ease),
    transform .5s var(--ease);
  background:
    radial-gradient(ellipse 80% 40% at 50% 0%,
      rgba(201,169,110,.07) 0%,transparent 100%),
    var(--card);
}
.page.active{
  opacity:1;pointer-events:all;
  transform:translateX(0) scale(1);
  position:relative;
}
.page.exit{
  opacity:0;
  transform:translateX(-48px) scale(.97);
  position:absolute;
}

/* ── CHARACTER ── */
.char-wrap{
  width:min(190px,46vw);
  margin-bottom:22px;
  flex-shrink:0;
  filter:drop-shadow(0 14px 30px rgba(44,24,4,.22));
  animation:charFloat 4s ease-in-out infinite;
  transform-origin:center bottom;
}
@keyframes charFloat{
  0%,100%{transform:translateY(0) rotate(-.5deg);}
  50%    {transform:translateY(-13px) rotate(.5deg);}
}

/* ── ORNAMENT ── */
.orn{
  display:flex;align-items:center;gap:10px;
  margin-bottom:16px;
}
.orn-l,.orn-r{
  flex:1;height:1px;
  background:linear-gradient(90deg,transparent,rgba(184,151,90,.5));
}
.orn-r{background:linear-gradient(90deg,rgba(184,151,90,.5),transparent);}
.orn-icon{
  width:7px;height:7px;
  background:var(--clay);
  transform:rotate(45deg);
  flex-shrink:0;
  box-shadow:0 0 0 2px rgba(184,151,90,.2);
}

/* ── TEXT ── */
.qt{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(1.2rem,5.2vw,1.65rem);
  font-weight:300;
  color:var(--ink);
  text-align:center;
  line-height:1.8;
  white-space:pre-line;
  margin-bottom:9px;
  letter-spacing:.2px;
}
.qt em{font-style:italic;color:var(--brown);font-weight:400;}
.qt strong{font-weight:600;color:#4a2c0e;}

.qs{
  font-family:'DM Sans',sans-serif;
  font-size:clamp(.74rem,3vw,.86rem);
  color:var(--clay);
  text-align:center;
  margin-bottom:22px;
  font-weight:300;
  letter-spacing:1px;
  opacity:.8;
}

/* ── BUTTONS ── */
.br{display:flex;gap:11px;justify-content:center;flex-wrap:wrap;}

.btn{
  position:relative;overflow:hidden;
  padding:14px 36px;
  border-radius:100px;border:none;
  font-family:'DM Sans',sans-serif;
  font-size:.84rem;font-weight:500;
  letter-spacing:2.2px;text-transform:uppercase;
  cursor:pointer;
  transition:transform .18s var(--ease),box-shadow .18s var(--ease);
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}
.btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.18),transparent 60%);
  border-radius:inherit;pointer-events:none;
}
.btn::after{
  content:'';position:absolute;
  top:0;left:-90%;width:55%;height:100%;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,.4),transparent);
  transform:skewX(-18deg);
  transition:left .55s var(--ease);
}
.btn:hover::after{left:145%;}
.btn:active{transform:translateY(4px) scale(.91)!important;box-shadow:none!important;}

/* LOVE */
.bl{
  background:linear-gradient(135deg,#c9a96e 0%,#8c5e28 50%,#c9a96e 100%);
  background-size:200% 100%;
  color:#fff8ec;
  box-shadow:
    0 5px 0 #5a3610,
    0 8px 24px rgba(140,94,40,.45),
    inset 0 1px 0 rgba(255,255,255,.2);
  animation:goldShift 4s linear infinite;
}
@keyframes goldShift{
  0%  {background-position:0% 0;}
  100%{background-position:200% 0;}
}
.bl:hover{transform:translateY(-3px);box-shadow:0 8px 0 #5a3610,0 16px 32px rgba(140,94,40,.55),inset 0 1px 0 rgba(255,255,255,.2);}

/* NO */
.bn{
  background:transparent;
  color:var(--clay);
  border:1.5px solid rgba(184,151,90,.4);
  padding:13px 28px;
}
.bn:hover{background:rgba(201,169,110,.08);border-color:var(--gold);transform:translateY(-2px);}

/* NEXT */
.bnx{
  background:linear-gradient(135deg,#7a5028,#4a2c0e);
  color:#f5e8d0;
  box-shadow:
    0 5px 0 #2c1408,
    0 8px 24px rgba(74,44,14,.4),
    inset 0 1px 0 rgba(255,255,255,.15);
}
.bnx:hover{transform:translateY(-3px);box-shadow:0 8px 0 #2c1408,0 16px 32px rgba(74,44,14,.5),inset 0 1px 0 rgba(255,255,255,.15);}

/* RESTART */
.brs{
  background:rgba(201,169,110,.1);
  color:var(--brown);
  border:1.5px solid rgba(184,151,90,.3);
  letter-spacing:1.8px;
}
.brs:hover{background:rgba(201,169,110,.18);transform:translateY(-2px);}

/* end */
.end-love .qt{color:var(--brown);}
.end-no   .qt{color:#7a6a58;}

/* ── FOOTER ── */
.foot{
  margin-top:18px;
  padding-top:12px;
  border-top:1px solid rgba(184,151,90,.12);
  width:100%;text-align:center;
  font-family:'Cormorant Garamond',serif;
  font-size:.7rem;letter-spacing:3px;
  color:rgba(160,120,72,.45);
  text-transform:uppercase;
}

/* ── MUSIC BTN ── */
#musicBtn{
  position:fixed;bottom:20px;right:20px;z-index:500;
  width:42px;height:42px;
  border-radius:50%;border:1.5px solid rgba(201,169,110,.3);
  background:rgba(17,14,9,.8);
  backdrop-filter:blur(16px);
  color:var(--gold);cursor:pointer;
  display:flex;align-items:center;justify-content:center;padding:10px;
  transition:transform .2s var(--ease),background .2s,border-color .2s;
  box-shadow:0 4px 20px rgba(0,0,0,.4);
  -webkit-tap-highlight-color:transparent;
}
#musicBtn:hover{background:rgba(201,169,110,.15);border-color:var(--gold);transform:scale(1.1);}
#musicBtn:active{transform:scale(.9);}
#musicBtn.playing::after{
  content:'';position:absolute;inset:-5px;border-radius:50%;
  border:1.5px solid rgba(201,169,110,.35);
  animation:ringPulse 1.8s ease-out infinite;
}
@keyframes ringPulse{
  0%  {transform:scale(1);opacity:.8;}
  100%{transform:scale(1.55);opacity:0;}
}
#musicBtn.playing svg{animation:noteSpin 5s linear infinite;}
@keyframes noteSpin{to{transform:rotate(360deg);}}

/* ── PARTICLES ── */
.pt{
  position:fixed;pointer-events:none;z-index:999;
  border-radius:50%;
  animation:ptUp .9s ease-out forwards;
}
@keyframes ptUp{
  0%  {opacity:.9;transform:translateY(0) scale(1);}
  100%{opacity:0;transform:translateY(-120px) scale(.05);}
}
.cf{
  position:fixed;pointer-events:none;z-index:999;
  animation:cfFall 1.7s ease-in forwards;
}
@keyframes cfFall{
  0%  {opacity:1;transform:translateY(0) rotate(0deg);}
  100%{opacity:0;transform:translateY(260px) rotate(760deg) scale(.08);}
}

/* ── POP-IN ── */
@keyframes popIn{
  0%  {transform:scale(.2) rotate(-14deg);opacity:0;}
  60% {transform:scale(1.1) rotate(3deg);opacity:1;}
  100%{transform:scale(1) rotate(0deg);opacity:1;}
}
.pi{animation:popIn .65s var(--spring) both;}
</style>
</head>

/* ══ BUILD ══ */
const PA=document.getElementById('PA');
let cur=0;

pages.forEach((p,i)=>{
  let bH='';
  if(p.type==='two'){
    bH=`<div class="br">
      <button class="btn bl" data-go="${p.lG}" data-c="#c9a96e">Love</button>
      <button class="btn bn" data-go="${p.nG}" data-c="#a09070">No</button>
    </div>`;
  }else if(p.type==='one'){
    bH=`<div class="br">
      <button class="btn bnx" data-go="${p.go}" data-c="#c9a96e">${p.btnT}</button>
    </div>`;
  }else{
    bH=`<div class="br">
      <button class="btn brs" data-restart="1" data-c="#a09070"></button>
    </div>`;
  }
  const pg=document.createElement('div');
  pg.className='page'+(i===0?' active':'')+(p.endC?' '+p.endC:'');
  pg.id=`pg${i}`;
  pg.innerHTML=`
    <div class="char-wrap pi">${p.char}</div>
    <div class="orn"><div class="orn-l"></div><div class="orn-icon"></div><div class="orn-r"></div></div>
    <div class="qt">${p.q}</div>
    ${p.s?`<div class="qs">${p.s}</div>`:''}
    ${bH}
    <div class="foot"> &nbsp;&middot;&nbsp; </div>`;
  PA.appendChild(pg);
});

/* ══ NAVIGATE ══ */
function go(idx,col,e){
  if(idx===cur)return;
  const op=document.getElementById(`pg${cur}`);
  op.classList.remove('active');op.classList.add('exit');
  setTimeout(()=>op.classList.remove('exit'),500);
  cur=idx;
  const np=document.getElementById(`pg${idx}`);
  np.classList.add('active');
  const ch=np.querySelector('.char-wrap');
  if(ch){ch.style.animation='none';void ch.offsetWidth;ch.style.animation='popIn .65s var(--spring) both';}
  burst(col,e);
  if(pages[idx].endC==='end-love')setTimeout(()=>confetti(),300);
}

function burst(col,e){
  const cs=col?[col]:['#c9a96e','#e8c98a','#a07838'];
  for(let k=0;k<14;k++){
    const p=document.createElement('div');p.className='pt';
    const sz=5+Math.random()*8;
    const x=e?.clientX??window.innerWidth/2;
    const y=e?.clientY??window.innerHeight/2;
    p.style.cssText=`left:${x+(Math.random()-.5)*130}px;top:${y+(Math.random()-.5)*90}px;width:${sz}px;height:${sz}px;background:${cs[k%cs.length]};border-radius:${Math.random()>.5?'50%':'2px'};`;
    document.body.appendChild(p);p.addEventListener('animationend',()=>p.remove());
  }
}
function confetti(){
  const cl=['#c9a96e','#e8c98a','#f5e4b8','#a07838','#7a5028','#dfc098'];
  for(let k=0;k<46;k++){
    const c=document.createElement('div');c.className='cf';
    c.style.cssText=`left:${Math.random()*100}vw;top:${-8+Math.random()*22}vh;background:${cl[k%cl.length]};width:${6+Math.random()*10}px;height:${6+Math.random()*10}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-delay:${Math.random()*.9}s;animation-duration:${1.4+Math.random()*1.2}s;`;
    document.body.appendChild(c);c.addEventListener('animationend',()=>c.remove());
  }
}

PA.addEventListener('click',e=>{
  const b=e.target.closest('button');if(!b)return;
  if(b.dataset.restart){
    pages.forEach((_,i)=>{document.getElementById(`pg${i}`).classList.remove('active','exit');});
    cur=0;document.getElementById('pg0').classList.add('active');burst(null,e);return;
  }
  if(b.dataset.go!==undefined)go(parseInt(b.dataset.go),b.dataset.c,e);
});

/* ══ MUSIC ══ */
const bgm=document.getElementById('bgm');
const musicBtn=document.getElementById('musicBtn');
const iconOn=document.getElementById('iconOn');
const iconOff=document.getElementById('iconOff');
let playing=false,started=false;

function setPlaying(v){
  playing=v;
  if(v){bgm.play().catch(()=>{});musicBtn.classList.add('playing');iconOn.style.display='block';iconOff.style.display='none';}
  else{bgm.pause();musicBtn.classList.remove('playing');iconOn.style.display='none';iconOff.style.display='block';}
}
musicBtn.addEventListener('click',()=>setPlaying(!playing));

function startMusic(){
  if(started)return;
  started=true;
  bgm.volume=0.7;
  setPlaying(true);
}
document.addEventListener('click',startMusic);
document.addEventListener('touchstart',startMusic);

/* ══ LOADER ══ */
window.addEventListener('load',()=>{
  setTimeout(()=>{
    document.getElementById('loader').classList.add('gone');
    document.getElementById('wrap').classList.add('show');
  },2200);
});
</script>
